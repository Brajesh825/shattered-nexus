<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Bestiary — Shattered Nexus</title>
<style>
/* ═══════════════════════════════════════════════════════════
   RESET & TOKENS
═══════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:       #06060f;
  --bg1:      #0b0b1a;
  --bg2:      #10101f;
  --bg3:      #16162c;
  --border:   rgba(255,255,255,0.07);
  --border-h: rgba(140,80,255,0.4);
  --text:     #ddd4f0;
  --text-dim: #6a5e8a;
  --text-muted:#3f3658;
  --accent:   #9040ff;
  --accent2:  #c070ff;
  --corrupt:  #b030ff;
  --mutant:   #30ff60;
  --gold:     #f0c040;
  --sans:     'Segoe UI','Helvetica Neue',Arial,sans-serif;
  --mono:     'Courier New',monospace;
  --radius:   12px;
  --card-w:   340px;
  --sprite:   108px;
  --ease:     cubic-bezier(.4,0,.2,1);
}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  min-height:100vh;
  overflow-x:hidden;
}

/* ═══════════════════════════════════════════════════════════
   AMBIENT BACKGROUND
═══════════════════════════════════════════════════════════ */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 20%, rgba(100,30,200,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 50% 35% at 80% 70%, rgba(50,10,100,0.06) 0%, transparent 70%);
  pointer-events:none;
  z-index:0;
}

/* ═══════════════════════════════════════════════════════════
   LAYOUT SHELL
═══════════════════════════════════════════════════════════ */
#shell{
  display:flex;
  min-height:100vh;
  position:relative;
  z-index:1;
}

/* ─── SIDEBAR ─── */
#sidebar{
  width:230px;
  flex-shrink:0;
  background:var(--bg1);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  position:sticky;
  top:0;
  height:100vh;
  overflow-y:auto;
  overflow-x:hidden;
  z-index:50;
}
#sidebar::-webkit-scrollbar{width:4px}
#sidebar::-webkit-scrollbar-track{background:transparent}
#sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.sb-logo{
  padding:22px 20px 18px;
  border-bottom:1px solid var(--border);
}
.sb-logo h1{
  font-size:13px;
  font-weight:700;
  letter-spacing:3px;
  text-transform:uppercase;
  background:linear-gradient(135deg,var(--accent2),#e0a0ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.sb-logo p{font-size:9px;color:var(--text-muted);margin-top:3px;letter-spacing:1px}

.sb-section{padding:16px 16px 0}
.sb-label{
  font-size:8.5px;font-weight:700;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--text-muted);
  margin-bottom:8px;padding-left:2px;
}

/* search */
.search-wrap{
  position:relative;
  padding:0 16px 16px;
  border-bottom:1px solid var(--border);
}
.search-wrap svg{
  position:absolute;left:26px;top:50%;transform:translateY(-50%);
  width:13px;height:13px;stroke:var(--text-muted);fill:none;
  stroke-width:2;stroke-linecap:round;stroke-linejoin:round;
  pointer-events:none;
}
#search{
  width:100%;
  background:var(--bg2);
  border:1px solid var(--border);
  color:var(--text);
  font-family:var(--sans);
  font-size:11px;
  padding:8px 10px 8px 30px;
  border-radius:6px;
  outline:none;
  transition:border-color .2s,box-shadow .2s;
}
#search:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(144,64,255,0.15)}
#search::placeholder{color:var(--text-muted)}

/* filter buttons (tier / element) */
.filter-group{
  display:flex;flex-wrap:wrap;gap:5px;
  padding-bottom:14px;
  border-bottom:1px solid var(--border);
  margin-bottom:0;
}
.fb{
  font-size:9px;font-weight:600;
  padding:4px 9px;border-radius:20px;
  border:1px solid var(--border);
  background:var(--bg2);color:var(--text-dim);
  cursor:pointer;transition:all .18s var(--ease);
  letter-spacing:.4px;white-space:nowrap;
  user-select:none;
}
.fb:hover{border-color:var(--accent);color:var(--accent2)}
.fb.on{
  background:rgba(144,64,255,0.18);
  border-color:var(--accent);
  color:var(--accent2);
  box-shadow:0 0 8px rgba(144,64,255,0.25);
}

/* element filter dots */
.efb{
  display:flex;align-items:center;gap:5px;
  font-size:9.5px;padding:5px 10px;border-radius:6px;
  border:1px solid var(--border);background:var(--bg2);
  color:var(--text-dim);cursor:pointer;transition:all .18s;
  user-select:none;width:100%;
}
.efb:hover{border-color:rgba(255,255,255,0.15);background:var(--bg3)}
.efb.on{background:var(--bg3);border-color:var(--border-h)}
.efb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.efb-name{text-transform:capitalize;font-weight:500}
.efb-count{margin-left:auto;font-size:8px;color:var(--text-muted);font-family:var(--mono)}
.elem-list{
  display:flex;flex-direction:column;gap:3px;
  padding-bottom:14px;
  border-bottom:1px solid var(--border);
}

/* sidebar stats */
.sb-stats{padding:14px 16px 20px;font-size:10px;color:var(--text-dim);line-height:1.8}
.sb-stats b{color:var(--text);font-size:12px}

/* view toggle */
.view-toggle{
  display:flex;gap:4px;
  padding:0 16px 16px;
  border-bottom:1px solid var(--border);
}
.vtb{
  flex:1;padding:6px 0;font-size:9px;font-weight:600;
  letter-spacing:.8px;text-transform:uppercase;
  border:1px solid var(--border);background:var(--bg2);
  color:var(--text-dim);cursor:pointer;border-radius:5px;
  transition:all .18s;text-align:center;
}
.vtb:hover{border-color:var(--accent);color:var(--text)}
.vtb.on{background:rgba(144,64,255,0.18);border-color:var(--accent);color:var(--accent2)}

/* size slider in sidebar */
.slider-wrap{
  padding:12px 16px 16px;
  border-bottom:1px solid var(--border);
  display:flex;flex-direction:column;gap:6px;
}
.slider-row{display:flex;justify-content:space-between;align-items:center}
.slider-row span{font-size:9px;color:var(--text-muted);letter-spacing:.8px;text-transform:uppercase}
.slider-row b{font-size:10px;color:var(--text-dim)}
input[type=range]{
  width:100%;accent-color:var(--accent);cursor:pointer;height:3px;
}

/* ─── MAIN ─── */
#main{
  flex:1;
  min-width:0;
  display:flex;
  flex-direction:column;
}

/* topbar inside main */
#topbar{
  position:sticky;top:0;z-index:40;
  background:rgba(6,6,15,0.85);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:12px 24px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.tb-left{display:flex;align-items:center;gap:10px}
.tb-count{
  font-size:10px;color:var(--text-muted);
  font-family:var(--mono);letter-spacing:.5px;
}
.tb-count b{color:var(--text-dim)}
.sort-btn{
  font-size:9px;padding:4px 10px;border-radius:5px;
  border:1px solid var(--border);background:var(--bg2);
  color:var(--text-dim);cursor:pointer;transition:all .15s;
  letter-spacing:.5px;font-family:var(--sans);
}
.sort-btn:hover{border-color:var(--accent);color:var(--accent2)}
.sort-btn.on{background:rgba(144,64,255,0.15);border-color:var(--accent);color:var(--accent2)}
.tb-right{display:flex;align-items:center;gap:8px}

/* ─── GRID ─── */
#grid{
  padding:28px 24px 60px;
  display:flex;flex-wrap:wrap;gap:16px;
  align-items:flex-start;
}
#grid.list-view{
  flex-direction:column;gap:8px;
  padding:16px 24px 60px;
}

/* tier separator */
.tier-sep{
  width:100%;
  display:flex;align-items:center;gap:14px;
  padding:6px 0 2px;
}
.tier-sep-line{flex:1;height:1px;background:linear-gradient(to right,var(--border),transparent)}
.tier-sep-label{
  font-size:9px;font-weight:700;letter-spacing:3px;
  text-transform:uppercase;color:var(--text-muted);
  white-space:nowrap;
}
.tier-sep-badge{
  padding:2px 8px;border-radius:20px;
  font-size:8px;font-weight:700;letter-spacing:1px;
  background:var(--bg2);border:1px solid var(--border);
  color:var(--text-muted);white-space:nowrap;
}
#grid.list-view .tier-sep{padding:10px 0 4px}

/* ═══════════════════════════════════════════════════════════
   CARD — GRID VIEW
═══════════════════════════════════════════════════════════ */
.card{
  width:var(--card-w);
  background:var(--bg1);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  display:flex;flex-direction:column;
  cursor:pointer;
  transition:border-color .22s var(--ease), box-shadow .22s var(--ease), transform .18s var(--ease);
  animation:cardIn .35s var(--ease) both;
}
.card:hover{
  border-color:var(--border-h);
  box-shadow:0 8px 40px rgba(100,30,200,0.2),0 0 0 1px rgba(144,64,255,0.15);
  transform:translateY(-2px);
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(10px)}
  to  {opacity:1;transform:translateY(0)}
}
.card.hidden{display:none!important}

/* card header */
.ch{
  padding:13px 15px 10px;
  background:linear-gradient(160deg,var(--bg2),var(--bg1));
  border-bottom:1px solid var(--border);
  position:relative;
  overflow:hidden;
}
/* subtle element color wash on header */
.ch::before{
  content:'';position:absolute;inset:0;
  opacity:.07;
  background:var(--elem-color,transparent);
  pointer-events:none;
}
.ch-name{font-size:13.5px;font-weight:700;color:var(--text);letter-spacing:.2px;line-height:1.2}
.ch-sub{font-size:9px;color:var(--text-muted);margin-top:3px;font-style:italic;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ch-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.tag{
  font-size:7.5px;font-weight:700;padding:2px 7px;
  border-radius:20px;letter-spacing:.5px;white-space:nowrap;
  border:1px solid;
}
.tag-tier  {background:rgba(100,50,200,0.15);color:#b090ff;border-color:rgba(100,50,200,0.3)}
.tag-elem  {border-color:rgba(255,255,255,0.1)}
.tag-weak  {background:rgba(255,80,80,0.1);color:#ff8080;border-color:rgba(255,80,80,0.25)}
.tag-resist{background:rgba(60,200,80,0.1);color:#60d080;border-color:rgba(60,200,80,0.25)}
.tag-drop  {background:rgba(240,180,40,0.1);color:#e0b040;border-color:rgba(240,180,40,0.25)}

/* sprites section */
.cs{
  display:flex;justify-content:space-around;align-items:flex-end;
  padding:20px 12px 16px;
  background:var(--bg);
  gap:6px;flex:1;
  position:relative;
}
.cs::before{
  content:'';position:absolute;
  bottom:0;left:0;right:0;height:30px;
  background:linear-gradient(to top,rgba(6,6,15,0.4),transparent);
  pointer-events:none;
}

/* each variant column */
.svc{display:flex;flex-direction:column;align-items:center;gap:6px}
.svc-top{
  position:relative;
  display:flex;align-items:flex-end;justify-content:center;
}
.svc-img{
  display:block;object-fit:contain;
  image-rendering:auto;
  transition:transform .2s var(--ease);
  position:relative;z-index:1;
}
.card:hover .svc-img{transform:translateY(-3px) scale(1.03)}

/* ── normal ── nothing extra */

/* ── corrupted ── */
.svc.corrupted .svc-img{
  filter:hue-rotate(225deg) saturate(2.6) brightness(0.80) contrast(1.12);
}
.svc.corrupted .svc-top{
  filter:drop-shadow(0 0 10px rgba(170,30,255,0.65));
}
.svc.corrupted .svc-img{
  animation:cCorrupt 2.2s ease-in-out infinite alternate;
}
@keyframes cCorrupt{
  from{filter:hue-rotate(220deg) saturate(2.4) brightness(0.80) contrast(1.1)}
  to  {filter:hue-rotate(235deg) saturate(3.0) brightness(0.87) contrast(1.18)}
}

/* ── mutant ── */
.svc.mutant .svc-img{
  filter:hue-rotate(108deg) saturate(3.6) brightness(1.18) contrast(1.3);
  animation:cMutant 0.95s ease-in-out infinite;
}
.svc.mutant .svc-top{
  filter:drop-shadow(0 0 12px rgba(40,255,70,0.7));
}
@keyframes cMutant{
  0%,100%{transform:skewX(0deg) scaleY(1) translateY(0)}
  28%    {transform:skewX(1.8deg) scaleY(0.98) translateY(1px)}
  72%    {transform:skewX(-1.4deg) scaleY(1.02) translateY(-1px)}
}
.card:hover .svc.mutant .svc-img{animation-play-state:running}

/* glow orb under sprite */
.glow-orb{
  position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);
  border-radius:50%;pointer-events:none;z-index:0;
}
.glow-orb.corrupted{
  width:62px;height:18px;
  background:radial-gradient(ellipse,rgba(160,30,255,0.6) 0%,transparent 70%);
  animation:orbC 1.8s ease-in-out infinite alternate;
}
.glow-orb.mutant{
  width:78px;height:22px;
  background:radial-gradient(ellipse,rgba(30,255,60,0.6) 0%,transparent 70%);
  animation:orbM .9s ease-in-out infinite alternate;
}
@keyframes orbC{from{opacity:.5;width:55px}to{opacity:1;width:68px}}
@keyframes orbM{from{opacity:.45;width:65px}to{opacity:1;width:88px}}

/* variant badge */
.vbadge{
  font-size:7px;font-weight:800;letter-spacing:1.8px;
  text-transform:uppercase;padding:2px 8px;border-radius:20px;
  border:1px solid;text-align:center;
}
.vb-n{color:var(--text-muted);background:var(--bg2);border-color:var(--border)}
.vb-c{
  color:#d070ff;background:rgba(140,20,255,0.12);border-color:rgba(160,30,255,0.4);
  text-shadow:0 0 8px rgba(180,60,255,0.7);
  animation:badgeGlowC 2s ease-in-out infinite alternate;
}
.vb-m{
  color:#40ff60;background:rgba(20,200,50,0.1);border-color:rgba(30,220,60,0.4);
  text-shadow:0 0 8px rgba(40,255,70,0.7);
  animation:badgeGlowM 1s ease-in-out infinite alternate;
}
@keyframes badgeGlowC{
  from{box-shadow:0 0 4px rgba(160,30,255,0.3)}
  to  {box-shadow:0 0 10px rgba(180,60,255,0.6)}
}
@keyframes badgeGlowM{
  from{box-shadow:0 0 4px rgba(30,220,60,0.3)}
  to  {box-shadow:0 0 10px rgba(40,255,80,0.6)}
}

/* stat bar strip */
.cstats{
  display:flex;gap:0;
  border-top:1px solid var(--border);
  background:var(--bg1);
}
.cst{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:7px 4px 8px;
  border-right:1px solid var(--border);
  gap:3px;
  position:relative;
  overflow:hidden;
}
.cst:last-child{border-right:none}
.cst::before{
  content:'';
  position:absolute;bottom:0;left:0;right:0;
  height:2px;
  background:var(--bar-col,var(--accent));
  transform:scaleX(var(--bar-pct,0));
  transform-origin:left;
  transition:transform .6s var(--ease) .3s;
  border-radius:1px;
}
.cst-val{font-size:10.5px;font-weight:700;color:var(--text);font-family:var(--mono)}
.cst-key{font-size:7px;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted)}

/* ═══════════════════════════════════════════════════════════
   LIST VIEW
═══════════════════════════════════════════════════════════ */
#grid.list-view .card{
  width:100%;flex-direction:row;align-items:stretch;
  border-radius:8px;
}
#grid.list-view .ch{
  width:220px;flex-shrink:0;border-bottom:none;border-right:1px solid var(--border);
}
#grid.list-view .cs{
  padding:10px 16px;flex:1;
  justify-content:flex-start;gap:20px;
  align-items:center;
}
#grid.list-view .svc{flex-direction:row;align-items:center;gap:8px}
#grid.list-view .svc-top{align-items:center}
#grid.list-view .vbadge{display:none}
#grid.list-view .glow-orb{display:none}
#grid.list-view .cstats{
  width:240px;flex-shrink:0;border-top:none;border-left:1px solid var(--border);
  flex-direction:column;justify-content:center;
}
#grid.list-view .cst{
  flex-direction:row;border-right:none;border-bottom:1px solid var(--border);
  padding:5px 12px;align-items:center;gap:0;
  justify-content:space-between;
}
#grid.list-view .cst:last-child{border-bottom:none}
#grid.list-view .cst::before{
  bottom:auto;left:0;top:0;right:auto;
  width:3px;height:100%;
  transform:scaleY(1) scaleX(1);
  border-radius:0;
}

/* ═══════════════════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════════════════ */
#modal-backdrop{
  position:fixed;inset:0;
  background:rgba(4,4,12,0.88);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  z-index:1000;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
  opacity:0;pointer-events:none;
  transition:opacity .25s var(--ease);
}
#modal-backdrop.open{opacity:1;pointer-events:all}
#modal{
  background:var(--bg1);
  border:1px solid rgba(144,64,255,0.3);
  border-radius:16px;
  max-width:820px;width:100%;
  max-height:90vh;overflow-y:auto;
  box-shadow:0 30px 80px rgba(0,0,0,0.7),0 0 0 1px rgba(144,64,255,0.1);
  transform:scale(.95) translateY(10px);
  transition:transform .25s var(--ease);
  scrollbar-width:thin;
  scrollbar-color:var(--border) transparent;
}
#modal-backdrop.open #modal{transform:scale(1) translateY(0)}

.modal-head{
  padding:22px 26px 18px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
  background:linear-gradient(160deg,var(--bg2),var(--bg1));
  border-radius:16px 16px 0 0;
  position:relative;overflow:hidden;
}
.modal-head::before{
  content:'';position:absolute;inset:0;
  opacity:.08;background:var(--elem-color,transparent);
}
.mh-info{position:relative}
.mh-name{font-size:20px;font-weight:800;color:var(--text);letter-spacing:.3px}
.mh-sub{font-size:10px;color:var(--text-muted);margin-top:4px;font-style:italic}
.mh-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.modal-close{
  width:30px;height:30px;border-radius:50%;
  border:1px solid var(--border);background:var(--bg2);
  color:var(--text-dim);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;
  transition:all .15s;position:relative;
}
.modal-close:hover{border-color:var(--border-h);color:var(--text);background:var(--bg3)}

/* big sprite compare */
.modal-sprites{
  display:flex;justify-content:space-around;align-items:flex-end;
  padding:36px 24px 28px;
  background:var(--bg);
  gap:16px;
  border-bottom:1px solid var(--border);
}
.ms-col{display:flex;flex-direction:column;align-items:center;gap:10px}
.ms-frame{
  position:relative;
  display:flex;align-items:flex-end;justify-content:center;
}
.ms-img{display:block;object-fit:contain;image-rendering:auto}
.ms-img.corrupted{
  filter:hue-rotate(225deg) saturate(2.6) brightness(0.80) contrast(1.12);
  animation:cCorrupt 2.2s ease-in-out infinite alternate;
}
.ms-img.mutant{
  filter:hue-rotate(108deg) saturate(3.6) brightness(1.18) contrast(1.3);
  animation:cMutant .95s ease-in-out infinite;
}
.ms-frame.corrupted{filter:drop-shadow(0 0 18px rgba(170,30,255,0.7))}
.ms-frame.mutant   {filter:drop-shadow(0 0 20px rgba(40,255,70,0.75))}

.ms-badge{
  font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
  padding:4px 14px;border-radius:20px;border:1px solid;
}
.ms-badge.normal   {color:var(--text-muted);background:var(--bg2);border-color:var(--border)}
.ms-badge.corrupted{
  color:#d070ff;background:rgba(140,20,255,0.12);border-color:rgba(160,30,255,0.4);
  text-shadow:0 0 10px rgba(180,60,255,0.8);
  box-shadow:0 0 12px rgba(160,30,255,0.3);
}
.ms-badge.mutant{
  color:#40ff60;background:rgba(20,200,50,0.1);border-color:rgba(30,220,60,0.4);
  text-shadow:0 0 10px rgba(40,255,70,0.8);
  box-shadow:0 0 12px rgba(30,220,60,0.3);
}
.ms-note{font-size:9px;color:var(--text-muted);text-align:center;line-height:1.6}

/* modal body sections */
.modal-body{padding:22px 26px 28px;display:flex;flex-direction:column;gap:20px}
.modal-section-title{
  font-size:9px;font-weight:800;letter-spacing:3px;text-transform:uppercase;
  color:var(--text-muted);margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.modal-section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* stat bars in modal */
.modal-stats{display:flex;flex-direction:column;gap:8px}
.mstat{display:flex;align-items:center;gap:10px}
.mstat-key{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);width:32px}
.mstat-bar{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.mstat-fill{height:100%;border-radius:3px;transition:width .7s var(--ease) .2s}
.mstat-val{font-size:10px;font-weight:700;font-family:var(--mono);color:var(--text);width:28px;text-align:right}

/* abilities table */
.ab-table{display:flex;flex-direction:column;gap:5px}
.ab-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 12px;border-radius:6px;
  background:var(--bg2);border:1px solid var(--border);
  font-size:10px;
}
.ab-name{font-weight:600;color:var(--text);flex:1}
.ab-type{
  font-size:8px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  padding:2px 7px;border-radius:10px;color:var(--text-muted);
  background:var(--bg3);border:1px solid var(--border);
}
.ab-mult{font-size:9px;font-family:var(--mono);color:var(--text-muted)}

/* drops */
.drops{display:flex;flex-wrap:wrap;gap:6px}
.drop-pill{
  font-size:9px;padding:3px 10px;border-radius:5px;
  background:rgba(240,180,40,0.08);border:1px solid rgba(240,180,40,0.25);
  color:#d0a030;
  display:flex;align-items:center;gap:6px;
}
.drop-chance{font-family:var(--mono);font-size:8px;color:#906020}

/* mutation info in modal */
.mut-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mut-box{
  padding:12px 14px;border-radius:8px;border:1px solid;
  display:flex;flex-direction:column;gap:6px;
}
.mut-box.corrupted{background:rgba(140,20,255,0.06);border-color:rgba(160,30,255,0.25)}
.mut-box.mutant{background:rgba(20,200,50,0.06);border-color:rgba(30,220,60,0.25)}
.mut-box-title{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase}
.mut-box.corrupted .mut-box-title{color:#c060ff}
.mut-box.mutant .mut-box-title{color:#40ff60}
.mut-box-line{font-size:9px;color:var(--text-dim);line-height:1.5}

/* ═══════════════════════════════════════════════════════════
   ELEMENT COLORS (CSS VARS applied via JS)
═══════════════════════════════════════════════════════════ */

/* ─── loading ─── */
#loading{
  position:fixed;inset:0;
  background:var(--bg);z-index:9999;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;
}
.ld-title{font-size:16px;font-weight:700;letter-spacing:4px;text-transform:uppercase;
  background:linear-gradient(135deg,var(--accent2),#e0c0ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ld-bar-wrap{width:240px;height:2px;background:var(--bg3);border-radius:1px;overflow:hidden}
#ld-bar{height:100%;width:0%;background:linear-gradient(to right,var(--accent),var(--accent2));transition:width .08s}
.ld-count{font-size:9px;color:var(--text-muted);letter-spacing:2px;font-family:var(--mono)}

/* responsive */
@media(max-width:700px){
  #sidebar{display:none}
  :root{--card-w:100%}
  #grid{padding:12px;gap:12px}
  .modal-sprites{flex-direction:column;align-items:center}
  .mut-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="loading">
  <div class="ld-title">Bestiary</div>
  <div class="ld-bar-wrap"><div id="ld-bar"></div></div>
  <div class="ld-count" id="ld-count">Loading…</div>
</div>

<div id="shell">

  <!-- ══ SIDEBAR ══ -->
  <aside id="sidebar">
    <div class="sb-logo">
      <h1>Bestiary</h1>
      <p>Shattered Nexus</p>
    </div>

    <div class="search-wrap" style="padding:14px 16px">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search" type="text" placeholder="Search enemies…" autocomplete="off"/>
    </div>

    <div class="sb-section">
      <div class="sb-label">Tier</div>
    </div>
    <div class="filter-group" style="padding:0 16px 16px;border-bottom:1px solid var(--border)">
      <button class="fb on" data-tier="all">All Tiers</button>
      <button class="fb" data-tier="1">Tier 1</button>
      <button class="fb" data-tier="2">Tier 2</button>
      <button class="fb" data-tier="3">Tier 3</button>
    </div>

    <div class="sb-section" style="padding-top:14px">
      <div class="sb-label">Element</div>
    </div>
    <div class="elem-list" style="padding:0 16px 14px;border-bottom:1px solid var(--border)" id="elem-filters"></div>

    <div class="sb-section" style="padding-top:14px">
      <div class="sb-label">View</div>
    </div>
    <div class="view-toggle">
      <button class="vtb on" data-view="grid">⊞ Grid</button>
      <button class="vtb" data-view="list">≡ List</button>
    </div>

    <div class="slider-wrap">
      <div class="slider-row">
        <span>Sprite Size</span>
        <b id="size-val">108px</b>
      </div>
      <input type="range" id="size-range" min="60" max="180" step="8" value="108"/>
    </div>

    <div class="sb-stats" id="sb-stats"></div>
  </aside>

  <!-- ══ MAIN ══ -->
  <main id="main">
    <div id="topbar">
      <div class="tb-left">
        <span class="tb-count" id="tb-count"><b>50</b> enemies</span>
      </div>
      <div class="tb-right">
        <button class="sort-btn on" data-sort="tier">Tier ↑</button>
        <button class="sort-btn" data-sort="name">A–Z</button>
        <button class="sort-btn" data-sort="hp">HP</button>
        <button class="sort-btn" data-sort="atk">ATK</button>
      </div>
    </div>
    <div id="grid"></div>
  </main>
</div>

<!-- ══ MODAL ══ -->
<div id="modal-backdrop">
  <div id="modal"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   DATA & CONFIG
═══════════════════════════════════════════════════════════ */
const ELEM_COLOR = {
  fire:'#ff5a30',water:'#38a8ff',ice:'#80d8ff',lightning:'#ffe030',
  wind:'#70ffb0',earth:'#d0a040',dark:'#c050ff',holy:'#fff060',
  physical:'#c8b898',void:'#8838d0',shadow:'#7848b8',
  light:'#fff080',poison:'#90ff40',
};
const ELEM_ICON = {
  fire:'🔥',water:'💧',ice:'❄',lightning:'⚡',wind:'🌀',earth:'🌿',
  dark:'🌑',holy:'✨',physical:'⚔',void:'🔮',shadow:'👁',
  light:'☀',poison:'☠',
};
const STAT_COLOR = {
  hp:'#ef4444',atk:'#f97316',def:'#3b82f6',mag:'#a855f7',spd:'#22c55e',
};
const TIER_LABEL = {
  1:'Tier 1 — Starting Lands',
  2:'Tier 2 — Haunted Woods & Highlands',
  3:'Tier 3 — Ember Wastes & Beyond',
};
// max stat values for bar scaling
const STAT_MAX = {hp:800,atk:120,def:100,mag:120,spd:30};

let ENEMIES = [];
let sprSize  = 108;
let activeTier = 'all';
let activeElem = 'all';
let searchQ    = '';
let sortKey    = 'tier';
let viewMode   = 'grid';
let activeModal = null;

/* ═══════════════════════════════════════════════════════════
   BUILD CARD
═══════════════════════════════════════════════════════════ */
function makeCard(en, idx) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.id     = en.id;
  card.dataset.tier   = en.tier || 1;
  card.dataset.elem   = en.element || 'physical';
  card.dataset.search = (en.name + ' ' + en.id + ' ' + (en.subtitle||'')).toLowerCase();
  card.dataset.idx    = idx;
  card.style.animationDelay = (idx % 30 * 18) + 'ms';

  const ec = ELEM_COLOR[en.element] || '#c8b898';
  const ei = ELEM_ICON[en.element]  || '⚔';
  const s  = en.stats || {};

  // header tags
  const weakT   = (en.weakTo  ||[]).map(e=>`<span class="tag tag-weak">▲ ${e}</span>`).join('');
  const resistT = (en.resistTo||[]).map(e=>`<span class="tag tag-resist">▼ ${e}</span>`).join('');

  card.innerHTML = `
    <div class="ch" style="--elem-color:${ec}">
      <div class="ch-name">${en.name||en.id}</div>
      <div class="ch-sub">${en.subtitle||'&nbsp;'}</div>
      <div class="ch-tags">
        <span class="tag tag-tier">T${en.tier||'?'}</span>
        <span class="tag tag-elem" style="color:${ec};border-color:${ec}44;background:${ec}12">${ei} ${en.element||'physical'}</span>
        ${weakT}${resistT}
      </div>
    </div>
    <div class="cs" id="cs-${en.id}"></div>
    <div class="cstats">
      ${['hp','atk','def','mag','spd'].map(k=>{
        const v = s[k]||0;
        const pct = Math.min(1, v / STAT_MAX[k]);
        return `<div class="cst" style="--bar-col:${STAT_COLOR[k]};--bar-pct:${pct}">
          <div class="cst-val">${v||'—'}</div>
          <div class="cst-key">${k}</div>
        </div>`;
      }).join('')}
    </div>`;

  // sprites
  buildSpriteRow(card.querySelector(`#cs-${en.id}`), en, sprSize);

  // click → modal
  card.addEventListener('click', () => openModal(en));
  return card;
}

function buildSpriteRow(container, en, size) {
  container.innerHTML = '';
  const variants = [
    { key:'normal',    cls:'',         vbCls:'vb-n', label:'Normal',    scale:1.00 },
    { key:'corrupted', cls:'corrupted',vbCls:'vb-c', label:'✦ Corrupted',scale:1.32 },
    { key:'mutant',    cls:'mutant',   vbCls:'vb-m', label:'⚠ Mutant',  scale:1.65 },
  ];
  variants.forEach(v => {
    const sz = Math.round(size * v.scale);
    const col = document.createElement('div');
    col.className = 'svc ' + v.cls;

    const top = document.createElement('div');
    top.className = 'svc-top';

    const img = document.createElement('img');
    img.className = 'svc-img';
    img.src = `images/enemies/${en.id}.png`;
    img.alt = en.name || en.id;
    img.width = sz; img.height = sz;
    img.style.width = sz+'px'; img.style.height = sz+'px';
    top.appendChild(img);

    if (v.cls) {
      const orb = document.createElement('div');
      orb.className = 'glow-orb ' + v.cls;
      top.appendChild(orb);
    }

    const badge = document.createElement('div');
    badge.className = 'vbadge ' + v.vbCls;
    badge.textContent = v.label;

    col.appendChild(top);
    col.appendChild(badge);
    container.appendChild(col);
  });
}

/* ═══════════════════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════════════════ */
function openModal(en) {
  activeModal = en;
  const modal = document.getElementById('modal');
  const s = en.stats || {};
  const ec = ELEM_COLOR[en.element] || '#c8b898';
  const ei = ELEM_ICON[en.element]  || '⚔';
  const MODAL_SIZE = 160;

  const weakT   = (en.weakTo  ||[]).map(e=>`<span class="tag tag-weak">▲ ${e}</span>`).join('');
  const resistT = (en.resistTo||[]).map(e=>`<span class="tag tag-resist">▼ ${e}</span>`).join('');
  const dropT   = (en.drops   ||[]).map(d=>`<div class="drop-pill">
    <span>${d.item}</span><span class="drop-chance">${Math.round(d.chance*100)}%</span></div>`).join('');

  const abilities = (en.abilities||[]).map(ab=>`
    <div class="ab-row">
      <span class="ab-name">${ab.name}</span>
      <span class="ab-type">${ab.type}</span>
      ${ab.dmgMultiplier?`<span class="ab-mult">×${ab.dmgMultiplier}</span>`:''}
    </div>`).join('');

  const statBars = ['hp','atk','def','mag','spd'].map(k=>{
    const v = s[k]||0;
    const pct = Math.min(100, v / STAT_MAX[k] * 100);
    return `<div class="mstat">
      <div class="mstat-key">${k}</div>
      <div class="mstat-bar"><div class="mstat-fill" style="width:${pct}%;background:${STAT_COLOR[k]}"></div></div>
      <div class="mstat-val">${v}</div>
    </div>`;
  }).join('');

  modal.innerHTML = `
    <div class="modal-head" style="--elem-color:${ec}">
      <div class="mh-info">
        <div class="mh-name">${en.name||en.id}</div>
        <div class="mh-sub">${en.subtitle||''}</div>
        <div class="mh-tags" style="margin-top:10px">
          <span class="tag tag-tier">Tier ${en.tier||'?'}</span>
          <span class="tag tag-elem" style="color:${ec};border-color:${ec}44;background:${ec}12">${ei} ${en.element||'physical'}</span>
          ${weakT}${resistT}
        </div>
      </div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>

    <div class="modal-sprites" id="modal-sprites">
      ${['normal','corrupted','mutant'].map(v=>{
        const sz = v==='mutant'?MODAL_SIZE*1.65:v==='corrupted'?MODAL_SIZE*1.32:MODAL_SIZE;
        const rounded = Math.round(sz);
        return `<div class="ms-col">
          <div class="ms-frame ${v}">
            <img class="ms-img ${v!=='normal'?v:''}"
              src="images/enemies/${en.id}.png" alt="${en.name||en.id}"
              width="${rounded}" height="${rounded}"
              style="width:${rounded}px;height:${rounded}px"/>
            ${v!=='normal'?`<div class="glow-orb ${v}"></div>`:''}
          </div>
          <div class="ms-badge ${v}">${v==='normal'?'Normal':v==='corrupted'?'✦ Corrupted':'⚠ Mutant'}</div>
          <div class="ms-note">${
            v==='corrupted'?'45s · 4%/s chance<br>+28% all stats · purple':
            v==='mutant'   ?'90s · 2.5%/s chance<br>+55% all stats · toxic green 1–3 traits':
            'Base form'
          }</div>
        </div>`;
      }).join('')}
    </div>

    <div class="modal-body">
      <div>
        <div class="modal-section-title">Stats</div>
        <div class="modal-stats">${statBars}</div>
        <div style="display:flex;gap:20px;margin-top:10px;font-size:9px;color:var(--text-muted)">
          <span>🏆 <b style="color:var(--text-dim)">${en.reward?.exp||0}</b> EXP</span>
          <span>🪙 <b style="color:var(--text-dim)">${en.reward?.gold||0}</b> Gold</span>
        </div>
      </div>

      ${abilities?`<div>
        <div class="modal-section-title">Abilities</div>
        <div class="ab-table">${abilities}</div>
      </div>`:''}

      ${dropT?`<div>
        <div class="modal-section-title">Drops</div>
        <div class="drops">${dropT}</div>
      </div>`:''}

      <div>
        <div class="modal-section-title">Mutation</div>
        <div class="mut-grid">
          <div class="mut-box corrupted">
            <div class="mut-box-title">✦ Corrupted</div>
            <div class="mut-box-line">
              Stats <b>×1.28</b> · +50% EXP · +40% Gold<br>
              Sprite shifts to deep violet.
            </div>
          </div>
          <div class="mut-box mutant">
            <div class="mut-box-title">⚠ Mutant</div>
            <div class="mut-box-line">
              Stats <b>×1.55</b> · +120% EXP · +100% Gold<br>
              Rolls 1–3 random traits. Toxic green.
            </div>
          </div>
        </div>
        <div style="margin-top:12px">
          <div style="font-size:8.5px;color:var(--text-muted);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">
            Thresholds by Map
          </div>
          <table style="width:100%;border-collapse:collapse;font-size:9px;font-family:var(--mono)">
            <thead>
              <tr style="color:var(--text-muted)">
                <th style="text-align:left;padding:4px 8px;border-bottom:1px solid var(--border)">Map</th>
                <th style="padding:4px 8px;border-bottom:1px solid var(--border)">Arc</th>
                <th style="padding:4px 8px;border-bottom:1px solid var(--border);color:#b030ff">Corrupt</th>
                <th style="padding:4px 8px;border-bottom:1px solid var(--border);color:#30ff60">Mutant</th>
                <th style="padding:4px 8px;border-bottom:1px solid var(--border)">C%/s</th>
                <th style="padding:4px 8px;border-bottom:1px solid var(--border)">M%/s</th>
              </tr>
            </thead>
            <tbody>
              ${[
                { map:'Verdant Vale',      arc:1, ct:90,  mt:180, cc:2.0, mc:1.0 },
                { map:'Crystal Cavern',    arc:2, ct:70,  mt:140, cc:2.8, mc:1.4 },
                { map:'Ember Wastes',      arc:3, ct:55,  mt:110, cc:3.6, mc:1.8 },
                { map:'Sunken Temple',     arc:4, ct:45,  mt:90,  cc:4.2, mc:2.2 },
                { map:'Shadow Reach',      arc:5, ct:38,  mt:76,  cc:4.8, mc:2.6 },
                { map:'Void Citadel',      arc:6, ct:32,  mt:64,  cc:5.4, mc:3.0 },
                { map:'Fortress Ramparts', arc:7, ct:26,  mt:52,  cc:6.0, mc:3.4 },
                { map:'Eternal Void',      arc:8, ct:20,  mt:40,  cc:6.8, mc:4.0 },
              ].map((r,i)=>{
                const isThis = en.tier && (
                  (en.tier===1 && r.arc<=2) ||
                  (en.tier===2 && r.arc>=3 && r.arc<=5) ||
                  (en.tier===3 && r.arc>=6)
                );
                const rowBg = isThis ? 'background:rgba(144,64,255,0.08)' : (i%2===0?'background:rgba(255,255,255,0.02)':'');
                return `<tr style="${rowBg}">
                  <td style="padding:4px 8px;color:${isThis?'var(--accent2)':'var(--text-dim)'};font-weight:${isThis?700:400}">${r.map}</td>
                  <td style="padding:4px 8px;text-align:center;color:var(--text-muted)">${r.arc}</td>
                  <td style="padding:4px 8px;text-align:center;color:#b030ff">${r.ct}s</td>
                  <td style="padding:4px 8px;text-align:center;color:#30ff60">${r.mt}s</td>
                  <td style="padding:4px 8px;text-align:center;color:var(--text-dim)">${r.cc}%</td>
                  <td style="padding:4px 8px;text-align:center;color:var(--text-dim)">${r.mc}%</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;

  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-backdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('open');
  document.body.style.overflow = '';
  activeModal = null;
}
document.getElementById('modal-backdrop').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-backdrop')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

/* ═══════════════════════════════════════════════════════════
   FILTER + SORT
═══════════════════════════════════════════════════════════ */
function getFiltered() {
  return ENEMIES.filter(en => {
    if (activeTier !== 'all' && String(en.tier) !== activeTier) return false;
    if (activeElem !== 'all' && en.element !== activeElem) return false;
    if (searchQ) {
      const s = (en.name+' '+en.id+' '+(en.subtitle||'')).toLowerCase();
      if (!s.includes(searchQ)) return false;
    }
    return true;
  });
}

function getSorted(list) {
  return [...list].sort((a,b)=>{
    if (sortKey==='tier') return (a.tier||0)-(b.tier||0) || (a.name||'').localeCompare(b.name||'');
    if (sortKey==='name') return (a.name||'').localeCompare(b.name||'');
    if (sortKey==='hp')   return (b.stats?.hp||0)-(a.stats?.hp||0);
    if (sortKey==='atk')  return (b.stats?.atk||0)-(a.stats?.atk||0);
    return 0;
  });
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.className = viewMode==='list' ? 'list-view' : '';
  grid.innerHTML = '';

  const filtered = getSorted(getFiltered());
  let lastTier = null;

  filtered.forEach((en, i) => {
    // tier separator (only in grid/tier sort)
    if (sortKey==='tier' && en.tier!==lastTier) {
      lastTier = en.tier;
      const sep = document.createElement('div');
      sep.className='tier-sep';
      const count = filtered.filter(x=>x.tier===en.tier).length;
      sep.innerHTML=`
        <span class="tier-sep-label">${TIER_LABEL[en.tier]||'Tier '+en.tier}</span>
        <span class="tier-sep-badge">${count} enemies</span>
        <div class="tier-sep-line"></div>`;
      grid.appendChild(sep);
    }
    grid.appendChild(makeCard(en, i));
  });

  // update counts
  const total = ENEMIES.length;
  const shown = filtered.length;
  document.getElementById('tb-count').innerHTML =
    shown===total ? `<b>${total}</b> enemies` : `<b>${shown}</b> of ${total} enemies`;
  updateSbStats(filtered);
}

function updateSbStats(filtered) {
  const counts = {};
  filtered.forEach(en => { counts[en.element] = (counts[en.element]||0)+1; });
  const lines = Object.entries(counts).sort((a,b)=>b[1]-a[1])
    .map(([el,c])=>`<span style="color:${ELEM_COLOR[el]||'#888'}">${ELEM_ICON[el]||''} ${el}</span>: <b>${c}</b>`)
    .join(' &nbsp;·&nbsp; ');
  document.getElementById('sb-stats').innerHTML = lines;
}

/* ═══════════════════════════════════════════════════════════
   ELEMENT FILTER SIDEBAR
═══════════════════════════════════════════════════════════ */
function buildElemFilters() {
  const container = document.getElementById('elem-filters');
  const counts = {};
  ENEMIES.forEach(en => { counts[en.element] = (counts[en.element]||0)+1; });
  const elems = Object.keys(counts).sort();

  // ALL button
  const allBtn = document.createElement('button');
  allBtn.className = 'efb on';
  allBtn.dataset.elem = 'all';
  allBtn.innerHTML = `<span class="efb-dot" style="background:#888"></span><span class="efb-name">All</span><span class="efb-count">${ENEMIES.length}</span>`;
  allBtn.addEventListener('click', () => setElem('all'));
  container.appendChild(allBtn);

  elems.forEach(el => {
    const btn = document.createElement('button');
    btn.className = 'efb';
    btn.dataset.elem = el;
    const col = ELEM_COLOR[el] || '#888';
    btn.innerHTML = `<span class="efb-dot" style="background:${col}"></span><span class="efb-name">${ELEM_ICON[el]||''} ${el}</span><span class="efb-count">${counts[el]}</span>`;
    btn.addEventListener('click', () => setElem(el));
    container.appendChild(btn);
  });
}

function setElem(el) {
  activeElem = el;
  document.querySelectorAll('.efb').forEach(b => b.classList.toggle('on', b.dataset.elem===el));
  renderGrid();
}

/* ═══════════════════════════════════════════════════════════
   CONTROLS
═══════════════════════════════════════════════════════════ */
// search
document.getElementById('search').addEventListener('input', function(){
  searchQ = this.value.toLowerCase().trim();
  renderGrid();
});

// tier filter
document.querySelectorAll('.fb[data-tier]').forEach(btn => {
  btn.addEventListener('click', function(){
    document.querySelectorAll('.fb[data-tier]').forEach(b=>b.classList.remove('on'));
    this.classList.add('on');
    activeTier = this.dataset.tier;
    renderGrid();
  });
});

// sort
document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', function(){
    document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('on'));
    this.classList.add('on');
    sortKey = this.dataset.sort;
    renderGrid();
  });
});

// view toggle
document.querySelectorAll('.vtb').forEach(btn => {
  btn.addEventListener('click', function(){
    document.querySelectorAll('.vtb').forEach(b=>b.classList.remove('on'));
    this.classList.add('on');
    viewMode = this.dataset.view;
    renderGrid();
  });
});

// size slider
document.getElementById('size-range').addEventListener('input', function(){
  sprSize = parseInt(this.value);
  document.getElementById('size-val').textContent = sprSize+'px';
  // update all existing sprite containers without full re-render
  ENEMIES.forEach(en => {
    const cs = document.querySelector(`#cs-${en.id}`);
    if (cs) buildSpriteRow(cs, en, sprSize);
  });
  // also re-render hidden ones when they appear
});

/* ═══════════════════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════════════════ */
async function init() {
  ENEMIES = await fetch('data/enemies.json').then(r=>r.json());
  const bar  = document.getElementById('ld-bar');
  const cnt  = document.getElementById('ld-count');
  cnt.textContent = `0 / ${ENEMIES.length}`;

  // Pre-warm: just tick the bar to 100% (cards render instantly)
  for (let i=0; i<ENEMIES.length; i++) {
    bar.style.width = Math.round((i+1)/ENEMIES.length*100)+'%';
    cnt.textContent = `${i+1} / ${ENEMIES.length}`;
    if (i%10===9) await new Promise(r=>setTimeout(r,0));
  }

  buildElemFilters();
  renderGrid();
  document.getElementById('loading').style.display = 'none';
}

init();
</script>
</body>
</html>
